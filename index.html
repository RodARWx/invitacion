<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Una invitación especial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            lora: ['Lora', 'serif'],
            montserrat: ['Montserrat', 'sans-serif'],
          },
          colors: {
            blush: {
              50: '#fff5f7',
              100: '#ffe8ee',
              200: '#ffd6e3',
              300: '#f9b8cc',
              400: '#f093b0',
              500: '#e07a9a',
            },
            rosewater: {
              50: '#fdf2f6',
              100: '#fae8ef',
              200: '#f5d5e2',
            }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(160deg, #fff5f7 0%, #fae8ef 40%, #f5d5e2 100%);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .font-lora { font-family: 'Lora', serif; }

    /* Tulip background decorations */
    .tulip-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .tulip-bg svg {
      position: absolute;
      opacity: 0.12;
    }

    .tulip-1 { top: 5%; left: 3%; width: 90px; transform: rotate(-15deg); }
    .tulip-2 { top: 12%; right: 5%; width: 70px; transform: rotate(20deg); }
    .tulip-3 { bottom: 15%; left: 8%; width: 100px; transform: rotate(10deg); }
    .tulip-4 { bottom: 8%; right: 10%; width: 80px; transform: rotate(-25deg); }
    .tulip-5 { top: 45%; left: -2%; width: 60px; transform: rotate(5deg); opacity: 0.08; }
    .tulip-6 { top: 35%; right: 2%; width: 75px; transform: rotate(-10deg); opacity: 0.08; }
    .tulip-7 { bottom: 40%; right: 15%; width: 55px; transform: rotate(18deg); opacity: 0.1; }
    .tulip-8 { top: 70%; left: 20%; width: 65px; transform: rotate(-8deg); opacity: 0.09; }

    /* Screen transitions */
    .screen {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .screen.hidden-screen {
      display: none;
    }

    #carousel-screen:not(.hidden-screen) {
      z-index: 105;
    }

    .screen.fade-out {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
    }

    .screen.fade-in {
      animation: fadeInUp 0.9s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    .btn-soft {
      background: linear-gradient(135deg, #f9b8cc 0%, #f093b0 100%);
      color: white;
      border: none;
      border-radius: 9999px;
      padding: 0.875rem 2.5rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(224, 122, 154, 0.25);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-soft:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(224, 122, 154, 0.35);
    }

    .btn-soft:active {
      transform: translateY(0);
    }

    .btn-outline {
      background: transparent;
      color: #e07a9a;
      border: 2px solid #f9b8cc;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-outline:hover {
      background: rgba(249, 184, 204, 0.15);
      border-color: #f093b0;
    }

    /* Photo frame */
    .photo-frame {
      position: relative;
      border-radius: 1.25rem;
      padding: 6px;
      background: linear-gradient(135deg, #f9b8cc, #ffd6e3, #f093b0, #ffd6e3);
      box-shadow: 0 8px 32px rgba(224, 122, 154, 0.18);
      max-width: 100%;
      width: 100%;
    }

    .photo-frame img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 1rem;
      object-fit: cover;
      aspect-ratio: 16 / 10;
      max-height: 280px;
    }

    @media (min-width: 640px) {
      .photo-frame img {
        max-height: 340px;
        aspect-ratio: 16 / 9;
      }
    }

    /* Confetti canvas — legacy removed */
    /* Success message */
    .success-message {
      animation: successPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes successPop {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Gentle pulse on welcome quote */
    .quote-glow {
      animation: gentleGlow 4s ease-in-out infinite;
    }

    @keyframes gentleGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(249, 184, 204, 0.2); }
      50% { text-shadow: 0 0 40px rgba(249, 184, 204, 0.4); }
    }

    /* Decline gentle shake */
    @keyframes gentleShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .shake { animation: gentleShake 0.5s ease; }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
    }

    .detail-icon {
      font-size: 1.25rem;
      flex-shrink: 0;
      width: 1.75rem;
      text-align: center;
    }

    /* Volume notice */
    .volume-notice {
      margin-top: 1.5rem;
      padding: 0.65rem 1.25rem;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(249, 184, 204, 0.45);
      border-radius: 9999px;
      font-size: 0.85rem;
      color: #b87a90;
      line-height: 1.5;
      animation: noticePulse 2.5s ease-in-out infinite;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .volume-notice.hidden-notice {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }

    @keyframes noticePulse {
      0%, 100% { box-shadow: 0 0 0 rgba(249, 184, 204, 0); }
      50% { box-shadow: 0 0 18px rgba(249, 184, 204, 0.35); }
    }

    .btn-soft:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Carrusel */
    .carousel-stage {
      position: relative;
      z-index: 110;
    }

    .carousel-frame {
      position: relative;
      width: min(92vw, 420px);
      aspect-ratio: 4 / 5;
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(224, 122, 154, 0.22);
      background: rgba(255, 245, 247, 0.6);
      border: 3px solid #f9b8cc;
    }

    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    .carousel-slide.active {
      opacity: 1;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-counter {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #c96b8a;
      letter-spacing: 0.08em;
      position: relative;
      z-index: 110;
    }

    /* Lluvia de flores — pantalla completa */
    #flower-rain-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #flower-rain-canvas.rain-active {
      opacity: 1;
    }

    #flower-rain-canvas.rain-success {
      z-index: 125;
    }

    /* Success — solo mensaje */
    .success-only {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #fff5f7 0%, #fae8ef 40%, #f5d5e2 100%);
    }

    .success-only.hidden-screen {
      display: none;
    }

    .success-only p {
      position: relative;
      z-index: 130;
      font-family: 'Lora', serif;
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      font-weight: 600;
      color: #e07a9a;
      text-align: center;
      animation: successPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
</head>
<body>

    <svg class="tulip-8" viewBox="0 0 60 90" fill="none" xmlns="http://www.w3.org/2000/svg">

  </div>

  <!-- STATE 1: Welcome -->
  <section id="welcome-screen" class="screen">
    <div class="text-center max-w-lg mx-auto">
      <p class="font-lora text-2xl sm:text-3xl md:text-4xl text-blush-500 italic leading-relaxed quote-glow px-2">
        "¿Quién quisiera a otra teniendo tus ojos?"
      </p>
      <p id="volume-notice" class="volume-notice mx-auto max-w-sm">
        Por favor, sube el volumen para una mejor experiencia
      </p>
      <div class="mt-8 sm:mt-10">
        <button id="btn-empezar" class="btn-soft" type="button" disabled>
          Empezar
        </button>
      </div>
    </div>
  </section>

  <!-- STATE 2: Carrusel de fotos -->
  <section id="carousel-screen" class="screen hidden-screen">
    <div class="carousel-stage text-center">
      <div id="carousel-frame" class="carousel-frame mx-auto" aria-live="polite">
        <!-- Slides generados por JS -->
      </div>
      <p id="carousel-counter" class="carousel-counter font-montserrat"></p>
    </div>
  </section>

  <!-- STATE 3: Invitation -->
  <section id="invitation-screen" class="screen hidden-screen">
    <div class="w-full max-w-md mx-auto text-center">
      <h1 class="font-lora text-xl sm:text-2xl md:text-3xl text-blush-500 font-medium leading-snug mb-6 px-2">
        Estás cordialmente invitada a una cita

      <div class="photo-frame mb-6">
        <img
          id="park-photo"
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Parque_Bicentenario_2017_looking_south.jpg/960px-Parque_Bicentenario_2017_looking_south.jpg"
          srcset="
            https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Parque_Bicentenario_2017_looking_south.jpg/480px-Parque_Bicentenario_2017_looking_south.jpg 480w,
            https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Parque_Bicentenario_2017_looking_south.jpg/800px-Parque_Bicentenario_2017_looking_south.jpg 800w,
            https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Parque_Bicentenario_2017_looking_south.jpg/1280px-Parque_Bicentenario_2017_looking_south.jpg 1280w
          "
          sizes="(max-width: 640px) 92vw, 448px"
          alt="Parque Bicentenario, Quito"
          loading="eager"
          decoding="async"
        >
      </div>

      <div class="bg-white/60 backdrop-blur-sm rounded-2xl px-5 py-4 mb-8 text-left shadow-sm border border-blush-200/50">
        <div class="detail-item">
          <span class="detail-icon">📍</span>
          <div>
            <span class="text-xs text-blush-400 uppercase tracking-wider font-medium">Ubicación</span>
            <p class="font-montserrat text-gray-700 text-sm sm:text-base font-medium">Parque Bicentenario</p>
          </div>
        </div>
        <div class="border-t border-blush-100"></div>
        <div class="detail-item">
          <span class="detail-icon">⏰</span>

            <span class="text-xs text-blush-400 uppercase tracking-wider font-medium">Hora</span>
            <p class="font-montserrat text-gray-700 text-sm sm:text-base font-medium">11:30 AM</p>
          </div>
        </div>

          <span class="detail-icon">📅</span>

          </div>

      <div id="buttons-container" class="flex flex-col sm:flex-row gap-3 justify-center items-center">

  <!-- STATE 4: Success (solo ¡Yeeeeei!) -->
  <section id="success-screen" class="success-only hidden-screen" aria-live="assertive">
    <p>¡Yeeeeei!</p>
  </section>

  <canvas id="flower-rain-canvas" aria-hidden="true"></canvas>
  <audio id="bg-audio" src="./audio/cancion.mp3" preload="auto"></audio>

  <script>
    // ── Rutas de medios (ajústalas si tus archivos tienen otro nombre) ──
    const AUDIO_SRC = './audio/cancion.mp3';
    const CAROUSEL_IMAGES = [
      './imagenes/1.jpeg',
      './imagenes/2.jpeg',
      './imagenes/3.jpeg',
      './imagenes/4.jpeg',
      './imagenes/5.jpeg',
    ];
    const VOLUME_NOTICE_MS = 5000;
    const SLIDE_DURATION_MS = 3500;
    const FADE_DURATION_MS = 1000;

    const welcomeScreen = document.getElementById('welcome-screen');
    const carouselScreen = document.getElementById('carousel-screen');
    const invitationScreen = document.getElementById('invitation-screen');
    const successScreen = document.getElementById('success-screen');
    const btnEmpezar = document.getElementById('btn-empezar');
    const volumeNotice = document.getElementById('volume-notice');
    const carouselFrame = document.getElementById('carousel-frame');
    const carouselCounter = document.getElementById('carousel-counter');
    const btnAcepto = document.getElementById('btn-acepto');
    const btnNoAcepto = document.getElementById('btn-no-acepto');
    const declineHint = document.getElementById('decline-hint');
    const buttonsContainer = document.getElementById('buttons-container');
    const bgAudio = document.getElementById('bg-audio');
    const canvas = document.getElementById('flower-rain-canvas');
    const ctx = canvas.getContext('2d');

    bgAudio.src = AUDIO_SRC;

    let confettiParticles = [];
    let animationId = null;
    let carouselTimer = null;
    let flowerRainActive = false;
    let rainMode = 'carousel';

    // Fallback if Wikimedia path changes
    document.getElementById('park-photo').addEventListener('error', function onImgError() {
      this.removeEventListener('error', onImgError);
      this.removeAttribute('srcset');
      this.src = 'https://commons.wikimedia.org/wiki/Special:FilePath/Parque_Bicentenario_2017_looking_south.jpg?width=960';
    });

    // ── Temporizador de aviso de volumen (5 s) ──
    setTimeout(() => {
      volumeNotice.classList.add('hidden-notice');
      btnEmpezar.disabled = false;
    }, VOLUME_NOTICE_MS);

    // ── Transición entre pantallas ──
    function switchScreen(from, to) {
      from.classList.add('fade-out');
      setTimeout(() => {
        from.classList.add('hidden-screen');
        from.classList.remove('fade-out');
        to.classList.remove('hidden-screen');
        to.classList.add('fade-in');
      }, 800);
    }

    // ── Carrusel ──
    function buildCarouselSlides() {
      carouselFrame.innerHTML = '';
      CAROUSEL_IMAGES.forEach((src, index) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide' + (index === 0 ? ' active' : '');
        const img = document.createElement('img');
        img.src = src;
        img.alt = `Foto ${index + 1}`;
        img.loading = 'eager';
        img.onerror = () => {
          const altExts = ['.jpeg', '.png', '.webp'];
          const base = src.replace(/\.(jpg|jpeg|png|webp)$/i, '');
          const tryIdx = Number(img.dataset.try || 0);
          if (tryIdx < altExts.length) {
            img.dataset.try = String(tryIdx + 1);
            img.src = base + altExts[tryIdx];
          }
        };
        slide.appendChild(img);
        carouselFrame.appendChild(slide);
      });
    }

    function startCarousel(onComplete) {
      buildCarouselSlides();
      const slides = carouselFrame.querySelectorAll('.carousel-slide');
      let current = 0;

      function updateCounter() {
        carouselCounter.textContent = `${current + 1} / ${slides.length}`;
      }

      function goToNext() {
        const prev = slides[current];
        current += 1;

        if (current >= slides.length) {
          carouselCounter.textContent = '';
          if (onComplete) onComplete();
          return;
        }

        const next = slides[current];
        next.classList.add('active');
        prev.classList.remove('active');
        updateCounter();
        carouselTimer = setTimeout(goToNext, SLIDE_DURATION_MS);
      }

      updateCounter();
      carouselTimer = setTimeout(goToNext, SLIDE_DURATION_MS);
    }

    // ── Empezar: audio + carrusel ──
    btnEmpezar.addEventListener('click', () => {
      btnEmpezar.disabled = true;
      bgAudio.currentTime = 0;
      bgAudio.play().catch(() => {
        /* El navegador puede bloquear audio sin interacción previa; el clic ya la desbloquea */
      });

      switchScreen(welcomeScreen, carouselScreen);
      startFlowerRain('carousel');
      startCarousel(() => {
        if (carouselTimer) clearTimeout(carouselTimer);
        stopFlowerRain();
        switchScreen(carouselScreen, invitationScreen);
      });
    });

    btnNoAcepto.addEventListener('click', () => {
      buttonsContainer.classList.add('shake');
      declineHint.textContent = 'Piénsalo un poquito más… tus ojos lo valen 💕';
      declineHint.classList.remove('hidden');
      setTimeout(() => buttonsContainer.classList.remove('shake'), 500);
    });

    btnAcepto.addEventListener('click', () => {
      btnAcepto.disabled = true;
      btnNoAcepto.disabled = true;

      welcomeScreen.classList.add('hidden-screen');
      carouselScreen.classList.add('hidden-screen');
      invitationScreen.classList.add('hidden-screen');

      successScreen.classList.remove('hidden-screen');
      startFlowerRain('success');
    });

    // ── Lluvia infinita de flores ──
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', () => {
      if (flowerRainActive) resizeCanvas();
    });

    const flowerColors = ['#f9b8cc', '#f093b0', '#e07a9a', '#ffd6e3', '#ffe8ee', '#f5a0b8', '#ffc0d4'];

    function getRainSettings(mode) {
      const mobile = window.innerWidth < 640;
      if (mode === 'carousel') {
        return {
          maxParticles: mobile ? 55 : 85,
          spawnEvery: 5,
          spawnBurst: 2,
          opacityMin: 0.45,
          opacityMax: 0.85,
        };
      }
      return {
        maxParticles: mobile ? 70 : 110,
        spawnEvery: 4,
        spawnBurst: 2,
        opacityMin: 0.65,
        opacityMax: 1,
      };
    }

    let rainSettings = getRainSettings('carousel');

    function randomType() {
      const r = Math.random();
      if (r < 0.35) return 'tulip';
      if (r < 0.6) return 'rose';
      if (r < 0.85) return 'petal';
      return 'blossom';
    }

    function createFlowerParticle() {
      const w = canvas.width;
      const h = canvas.height;
      let x;

      if (rainMode === 'carousel') {
        const margin = w * 0.08;
        const centerStart = w * 0.22;
        const centerEnd = w * 0.78;
        if (Math.random() < 0.72) {
          x = Math.random() < 0.5
            ? margin + Math.random() * (centerStart - margin)
            : centerEnd + Math.random() * (w - margin - centerEnd);
        } else {
          x = centerStart + Math.random() * (centerEnd - centerStart);
        }
      } else {
        x = Math.random() * w;
      }

      const size = Math.random() * 16 + 8;
      const baseOpacity = rainSettings.opacityMin +
        Math.random() * (rainSettings.opacityMax - rainSettings.opacityMin);

      return {
        x,
        y: Math.random() * -h * 0.4 - size,
        size,
        color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
        rotation: Math.random() * 360,
        rotationSpeed: (Math.random() - 0.5) * 3,
        vx: (Math.random() - 0.5) * 1.2,
        vy: Math.random() * 1.4 + 1.2,
        opacity: baseOpacity,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: Math.random() * 0.04 + 0.02,
        sway: Math.random() * 1.5 + 0.5,
        type: randomType(),
      };
    }

    function drawRose(size, color) {
      const petals = 8;
      for (let i = 0; i < petals; i++) {
        const angle = (i / petals) * Math.PI * 2;
        ctx.save();
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, -size * 0.45, size * 0.35, size * 0.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = '#e07a9a';
      ctx.fill();
    }

    function drawTulipShape(size, color) {
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.55);
      ctx.bezierCurveTo(-size * 0.55, -size * 0.25, -size * 0.45, size * 0.35, 0, size * 0.45);
      ctx.bezierCurveTo(size * 0.45, size * 0.35, size * 0.55, -size * 0.25, 0, -size * 0.55);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, size * 0.45);
      ctx.lineTo(0, size * 0.9);
      ctx.strokeStyle = 'rgba(124, 184, 124, 0.7)';
      ctx.lineWidth = Math.max(1, size * 0.06);
      ctx.stroke();
    }

    function drawFlower(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.globalAlpha = p.opacity;

      if (p.type === 'tulip') {
        drawTulipShape(p.size, p.color);
      } else if (p.type === 'rose') {
        drawRose(p.size, p.color);
      } else if (p.type === 'blossom') {
        for (let i = 0; i < 5; i++) {
          ctx.save();
          ctx.rotate((i / 5) * Math.PI * 2);
          ctx.beginPath();
          ctx.ellipse(0, -p.size * 0.3, p.size * 0.22, p.size * 0.3, 0, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          ctx.restore();
        }
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = '#ffd6e3';
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size * 0.45, p.size * 0.28, p.rotation * 0.02, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }

      ctx.restore();
    }

    function spawnFlowers(count) {
      for (let i = 0; i < count; i++) {
        if (confettiParticles.length < rainSettings.maxParticles) {
          confettiParticles.push(createFlowerParticle());
        }
      }
    }

    function stopFlowerRain() {
      flowerRainActive = false;
      canvas.classList.remove('rain-active', 'rain-success');
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      confettiParticles = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function startFlowerRain(mode = 'success') {
      rainMode = mode;
      rainSettings = getRainSettings(mode);
      flowerRainActive = true;

      canvas.classList.toggle('rain-success', mode === 'success');
      canvas.classList.add('rain-active');

      resizeCanvas();
      confettiParticles = [];
      spawnFlowers(rainSettings.maxParticles);

      let frame = 0;

      function animate() {
        if (!flowerRainActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frame++;

        if (frame % rainSettings.spawnEvery === 0) {
          spawnFlowers(rainSettings.spawnBurst);
        }

        confettiParticles.forEach((p) => {
          p.wobble += p.wobbleSpeed;
          p.x += p.vx + Math.sin(p.wobble) * p.sway * 0.15;
          p.y += p.vy;
          p.rotation += p.rotationSpeed;
          p.vy += 0.008;
        });

        confettiParticles = confettiParticles.filter((p) => p.y < canvas.height + p.size * 2);
        confettiParticles.forEach(drawFlower);

        animationId = requestAnimationFrame(animate);
      }

      if (animationId) cancelAnimationFrame(animationId);
      animate();
    }
  </script>
</body>
</html>
