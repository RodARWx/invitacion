<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta QR — Invitación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem 1rem;
      background: #ece0e4;
      font-family: 'Montserrat', sans-serif;
    }

    .print-hint {
      color: #8a5a6a;
      font-size: 0.9rem;
      text-align: center;
      max-width: 28rem;
      line-height: 1.5;
    }

    .print-btn {
      background: linear-gradient(135deg, #f9b8cc, #f093b0);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.75rem 2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(224, 122, 154, 0.3);
    }

    .print-btn:hover { transform: translateY(-1px); }

    /* Tarjeta 10 x 15 cm */
    .card {
      position: relative;
      width: 10cm;
      height: 15cm;
      background: linear-gradient(165deg, #fff5f7 0%, #fae8ef 45%, #f5d5e2 100%);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(180, 100, 130, 0.22);
    }

    .card-border-outer {
      position: absolute;
      inset: 10px;
      border: 3px solid #f093b0;
      border-radius: 14px;
      pointer-events: none;
    }

    .card-border-inner {
      position: absolute;
      inset: 18px;
      border: 1.5px solid #f9b8cc;
      border-radius: 10px;
      pointer-events: none;
    }

    .garland {
      position: absolute;
      left: 0;
      right: 0;
      height: 50px;
      pointer-events: none;
    }

    .garland-top { top: 22px; }
    .garland-bottom { bottom: 22px; transform: scaleY(-1); }

    .corner-flower {
      position: absolute;
      width: 72px;
      height: 72px;
      pointer-events: none;
    }

    .corner-tl { top: 28px; left: 20px; }
    .corner-tr { top: 28px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 28px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 28px; right: 20px; transform: scale(-1, -1); }

    .side-tulip {
      position: absolute;
      width: 48px;
      height: 72px;
      opacity: 0.85;
      pointer-events: none;
    }

    .tulip-left-1 { left: 8px; top: 34%; }
    .tulip-left-2 { left: 14px; top: 58%; transform: scale(0.85); }
    .tulip-right-1 { right: 8px; top: 40%; transform: scaleX(-1); }
    .tulip-right-2 { right: 14px; top: 64%; transform: scaleX(-1) scale(0.85); }

    .card-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.2cm 1cm 1cm;
      text-align: center;
    }

    .card-title {
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: #c96b8a;
      line-height: 1.35;
      margin-bottom: 0.15cm;
    }

    .card-subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #b87a90;
      margin-bottom: 0.45cm;
    }

    .qr-frame {
      padding: 7px;
      background: linear-gradient(135deg, #f9b8cc, #ffd6e3, #f093b0, #ffd6e3);
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(224, 122, 154, 0.2);
    }

    .qr-frame img {
      display: block;
      width: 4.6cm;
      height: 4.6cm;
      border-radius: 8px;
      background: #fff5f7;
    }

    .card-url {
      margin-top: 0.35cm;
      font-size: 0.48rem;
      color: #a86d82;
      word-break: break-all;
      line-height: 1.4;
      max-width: 7.5cm;
    }

    .card-footer {
      position: absolute;
      bottom: 0.75cm;
      left: 0;
      right: 0;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.62rem;
      color: #c96b8a;
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #f9b8cc;
      border-radius: 50%;
      opacity: 0.6;
    }

    .s1 { top: 42%; left: 28%; }
    .s2 { top: 48%; right: 26%; }
    .s3 { top: 62%; left: 32%; }

    @media print {
      @page {
        size: 10cm 15cm;
        margin: 0;
      }

      body {
        background: white;
        padding: 0;
        margin: 0;
        min-height: auto;
        display: block;
      }

      .print-hint,
      .print-btn {
        display: none !important;
      }

      .card {
        width: 10cm;
        height: 15cm;
        margin: 0 auto;
        box-shadow: none;
        page-break-after: avoid;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

  <p class="print-hint">
  Tarjeta lista para imprimir (10 × 15 cm). Usa <strong>Ctrl + P</strong>, desactiva «Ajustar a página» y activa «Gráficos de fondo».
  </p>

  <button class="print-btn" type="button" onclick="window.print()">Imprimir tarjeta</button>

  <article class="card" aria-label="Tarjeta con código QR de la invitación">
    <div class="card-border-outer"></div>
    <div class="card-border-inner"></div>

    <!-- Guirnalda superior -->
    <svg class="garland garland-top" viewBox="0 0 380 50" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M10 30 Q50 10, 90 30 T170 30 T250 30 T330 30 T370 30" stroke="#f9b8cc" stroke-width="1.5" fill="none"/>
      <ellipse cx="50" cy="22" rx="8" ry="10" fill="#f093b0" opacity="0.7"/>
      <ellipse cx="130" cy="20" rx="7" ry="9" fill="#e07a9a" opacity="0.65"/>
      <ellipse cx="190" cy="18" rx="9" ry="11" fill="#f9b8cc" opacity="0.75"/>
      <ellipse cx="250" cy="20" rx="7" ry="9" fill="#f093b0" opacity="0.65"/>
      <ellipse cx="330" cy="22" rx="8" ry="10" fill="#e07a9a" opacity="0.7"/>
    </svg>

  <svg class="garland garland-bottom" viewBox="0 0 380 50" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M10 30 Q50 10, 90 30 T170 30 T250 30 T330 30 T370 30" stroke="#f9b8cc" stroke-width="1.5" fill="none"/>
      <ellipse cx="70" cy="22" rx="8" ry="10" fill="#f093b0" opacity="0.7"/>
      <ellipse cx="190" cy="18" rx="9" ry="11" fill="#f9b8cc" opacity="0.75"/>
      <ellipse cx="310" cy="22" rx="8" ry="10" fill="#e07a9a" opacity="0.7"/>
    </svg>

    <!-- Rosas en esquinas -->
    <svg class="corner-flower corner-tl" viewBox="0 0 80 80" aria-hidden="true">
      <g transform="translate(40,40)">
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f9b8cc" transform="rotate(0)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f093b0" transform="rotate(45)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f9b8cc" transform="rotate(90)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#e07a9a" transform="rotate(135)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f093b0" transform="rotate(180)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f9b8cc" transform="rotate(225)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#e07a9a" transform="rotate(270)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f093b0" transform="rotate(315)"/>
        <circle cx="0" cy="0" r="7" fill="#e07a9a"/>
        <path d="M0 8 L0 28" stroke="#7cb87c" stroke-width="2"/>
        <ellipse cx="-10" cy="18" rx="8" ry="5" fill="#7cb87c" transform="rotate(-30 -10 18)"/>
      </g>
    </svg>

    <svg class="corner-flower corner-tr" viewBox="0 0 80 80" aria-hidden="true">
      <g transform="translate(40,40)">
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f9b8cc" transform="rotate(0)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f093b0" transform="rotate(45)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f9b8cc" transform="rotate(90)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#e07a9a" transform="rotate(135)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f093b0" transform="rotate(180)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f9b8cc" transform="rotate(225)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#e07a9a" transform="rotate(270)"/>
        <ellipse cx="0" cy="-14" rx="12" ry="16" fill="#f093b0" transform="rotate(315)"/>
        <circle cx="0" cy="0" r="7" fill="#e07a9a"/>
      </g>
    </svg>

    <svg class="corner-flower corner-bl" viewBox="0 0 80 80" aria-hidden="true">
      <g transform="translate(40,40)">
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f9b8cc" transform="rotate(0)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f093b0" transform="rotate(60)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#e07a9a" transform="rotate(120)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f093b0" transform="rotate(180)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f9b8cc" transform="rotate(240)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#e07a9a" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="6" fill="#e07a9a"/>
      </g>
    </svg>

    <svg class="corner-flower corner-br" viewBox="0 0 80 80" aria-hidden="true">
      <g transform="translate(40,40)">
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f9b8cc" transform="rotate(0)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f093b0" transform="rotate(60)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#e07a9a" transform="rotate(120)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f093b0" transform="rotate(180)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#f9b8cc" transform="rotate(240)"/>
        <ellipse cx="0" cy="-12" rx="10" ry="14" fill="#e07a9a" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="6" fill="#e07a9a"/>
      </g>
    </svg>

    <!-- Tulipanes laterales -->
    <svg class="side-tulip tulip-left-1" viewBox="0 0 50 75" aria-hidden="true">
      <path d="M25 18 C15 8, 8 14, 12 28 C14 36, 20 40, 25 44 C30 40, 36 36, 38 28 C42 14, 35 8, 25 18Z" fill="#f093b0"/>
      <path d="M23 44 L25 68 L27 44" stroke="#7cb87c" stroke-width="2" fill="none"/>
      <ellipse cx="14" cy="54" rx="7" ry="4" fill="#7cb87c" transform="rotate(-25 14 54)"/>
    </svg>
    <svg class="side-tulip tulip-left-2" viewBox="0 0 50 75" aria-hidden="true">
      <path d="M25 18 C15 8, 8 14, 12 28 C14 36, 20 40, 25 44 C30 40, 36 36, 38 28 C42 14, 35 8, 25 18Z" fill="#e07a9a"/>
      <path d="M23 44 L25 68 L27 44" stroke="#6aaa6a" stroke-width="2" fill="none"/>
    </svg>
    <svg class="side-tulip tulip-right-1" viewBox="0 0 50 75" aria-hidden="true">
      <path d="M25 18 C15 8, 8 14, 12 28 C14 36, 20 40, 25 44 C30 40, 36 36, 38 28 C42 14, 35 8, 25 18Z" fill="#f9b8cc"/>
      <path d="M23 44 L25 68 L27 44" stroke="#7cb87c" stroke-width="2" fill="none"/>
      <ellipse cx="36" cy="52" rx="7" ry="4" fill="#7cb87c" transform="rotate(25 36 52)"/>
    </svg>
    <svg class="side-tulip tulip-right-2" viewBox="0 0 50 75" aria-hidden="true">
      <path d="M25 18 C15 8, 8 14, 12 28 C14 36, 20 40, 25 44 C30 40, 36 36, 38 28 C42 14, 35 8, 25 18Z" fill="#f093b0"/>
      <path d="M23 44 L25 68 L27 44" stroke="#7cb87c" stroke-width="2" fill="none"/>
    </svg>

    <span class="sparkle s1" aria-hidden="true"></span>
    <span class="sparkle s2" aria-hidden="true"></span>
    <span class="sparkle s3" aria-hidden="true"></span>

    <div class="card-content">
      <h1 class="card-title">Una invitación especial</h1>
      <p class="card-subtitle">Escanea para abrir</p>

      <div class="qr-frame">
        <img
          src="qr-invitacion.png"
          alt="Código QR de la invitación"
          width="174"
          height="174"
        >
      </div>

      <p class="card-url">rodarwx.github.io/invitacion</p>
    </div>

    <p class="card-footer">Con cariño, para ti</p>
  </article>

</body>
</html>
